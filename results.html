<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>Live Results</h1>
    <table>
        <thead><tr><th>Name</th><th>ID</th><th>Exam</th><th>Score</th></tr></thead>
        <tbody id="list"></tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE", authDomain: "bright-cbt.firebaseapp.com", projectId: "bright-cbt", storageBucket: "bright-cbt.firebasestorage.app", messagingSenderId: "834402482237", appId: "1:834402482237:web:63c717f80cd154dd1cd254" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    onSnapshot(collection(db, "students"), (snap) => {
        const body = document.getElementById('list');
        body.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            body.innerHTML += `<tr><td>${s.studentName}</td><td>${s.loginID}</td><td>${s.examTaken || '-'}</td><td>${s.score}</td></tr>`;
        });
    });
</script>
</body>
</html>
