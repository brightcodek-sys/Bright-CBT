<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bright-CBT Admin</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #16213e; padding: 20px; border-radius: 10px; margin-bottom: 20px; max-width: 500px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 10px; background: #4ecca3; border: none; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>
    <div class="card">
        <h3>1. Register Student</h3>
        <input type="text" id="n" placeholder="Name">
        <input type="text" id="i" placeholder="Admission ID">
        <button onclick="reg()">Register</button>
    </div>
    <div class="card">
        <h3>2. Upload Exam (Excel)</h3>
        <input type="text" id="title" placeholder="Exam Name (e.g. MATH_J1)">
        <input type="file" id="f">
        <button onclick="up()">Upload Questions</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
        authDomain: "bright-cbt.firebaseapp.com",
        projectId: "bright-cbt",
        storageBucket: "bright-cbt.firebasestorage.app",
        messagingSenderId: "834402482237",
        appId: "1:834402482237:web:63c717f80cd154dd1cd254"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.reg = async () => {
        const id = document.getElementById('i').value;
        await setDoc(doc(db, "students", id), { studentName: document.getElementById('n').value, loginID: id, hasFinished: false, score: 0, regDate: new Date() });
        alert("Done!");
    }

    window.up = async () => {
        const file = document.getElementById('f').files[0];
        const title = document.getElementById('title').value;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            for(let q of json) {
                await addDoc(collection(db, "questions"), { examID: title, question: q.Question, options: [q.OptionA, q.OptionB, q.OptionC, q.OptionD], answer: q.Answer });
            }
            alert("Uploaded!");
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
