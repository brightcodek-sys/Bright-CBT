<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright-CBT | Exam</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; }
        .opt { display: block; background: #eee; padding: 10px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
        .opt:hover { background: #ddd; }
        #submitBtn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3 id="qDisplay">Loading questions...</h3>
        <div id="options"></div>
        <p>Question <span id="qNum">0</span></p>
        <button id="submitBtn" class="hidden">Submit Exam</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { initializeFirestore, doc, collection, getDocs, updateDoc, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* SAME AS ABOVE */ };
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true,
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });

    let questions = [];
    let currentIdx = 0;
    let score = 0;
    const studentID = localStorage.getItem('studentID');

    async function load() {
        const snap = await getDocs(collection(db, "questions"));
        snap.forEach(d => questions.push(d.data()));
        showQuestion();
    }

    function showQuestion() {
        if(currentIdx >= questions.length) {
            document.getElementById('qDisplay').innerText = "Exam Finished!";
            document.getElementById('options').innerHTML = "";
            document.getElementById('submitBtn').classList.remove('hidden');
            return;
        }
        let q = questions[currentIdx];
        document.getElementById('qDisplay').innerText = q.q;
        document.getElementById('qNum').innerText = (currentIdx + 1);
        let html = "";
        ['A','B','C','D'].forEach(letter => {
            html += `<div class="opt" onclick="window.check('${letter}')">${letter}: ${q[letter]}</div>`;
        });
        document.getElementById('options').innerHTML = html;
    }

    window.check = (choice) => {
        if(choice === questions[currentIdx].ans) score++;
        currentIdx++;
        showQuestion();
    };

    document.getElementById('submitBtn').onclick = async () => {
        try {
            await updateDoc(doc(db, "students", studentID), { score: score, hasFinished: true });
            alert("Score Saved: " + score);
            window.location.href = "index.html";
        } catch(e) { alert("Error saving score. Please show this screen to the teacher. Score: " + score); }
    };

    load();
</script>
</body>
</html>
