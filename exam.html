<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bright-CBT | Examination</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        /* Timer Style */
        .timer-bar { 
            position: sticky; top: 0; background: #333; color: white; 
            padding: 15px; text-align: center; font-size: 20px; 
            font-weight: bold; border-radius: 8px; margin-bottom: 20px;
            z-index: 1000;
        }
        .exam-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .question-box { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        .option { display: block; margin: 10px 0; padding: 10px; background: #f9f9f9; border: 1px solid #ddd; cursor: pointer; border-radius: 5px; }
        .option:hover { background: #e9ecef; }
        .selected { background: #d1ecf1; border-color: #bee5eb; font-weight: bold; }
        #submitBtn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .warning { color: #ff4444; }
    </style>
</head>
<body>

<div class="timer-bar" id="timerDisplay">Time Remaining: 60:00</div>

<div class="exam-container">
    <h2 id="welcome">Loading Exam...</h2>
    <div id="questions-list"></div>
    <button id="submitBtn" style="display:none;">Submit Exam</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
        authDomain: "bright-cbt.firebaseapp.com",
        projectId: "bright-cbt",
        storageBucket: "bright-cbt.firebasestorage.app",
        messagingSenderId: "834402482237",
        appId: "1:834402482237:web:63c717f80cd154dd1cd254"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const studentID = localStorage.getItem('currentStudent');
    const questionsList = document.getElementById('questions-list');
    const timerDisplay = document.getElementById('timerDisplay');
    let userAnswers = {};
    let timeLeft = 3600; // 3600 seconds = 1 hour

    if (!studentID) { window.location.href = "index.html"; }
    document.getElementById('welcome').innerText = `Student: ${studentID}`;

    // --- TIMER LOGIC ---
    const startTimer = () => {
        const timerInterval = setInterval(() => {
            timeLeft--;
            
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            // Format time as 00:00
            timerDisplay.innerText = `Time Remaining: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (timeLeft <= 300) { // Red warning at 5 minutes
                timerDisplay.classList.add('warning');
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("Time is up! Your exam will be submitted automatically.");
                processSubmission(); // Force submit
            }
        }, 1000);
    };

    // --- FETCH QUESTIONS ---
    async function loadQuestions() {
        const querySnapshot = await getDocs(collection(db, "questions"));
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const qID = doc.id;
            const qDiv = document.createElement('div');
            qDiv.className = 'question-box';
            qDiv.innerHTML = `<p><strong>${data.questionText}</strong></p>`;

            data.options.forEach((opt, index) => {
                const optBtn = document.createElement('div');
                optBtn.className = 'option';
                optBtn.innerText = opt;
                optBtn.onclick = () => {
                    Array.from(qDiv.querySelectorAll('.option')).forEach(b => b.classList.remove('selected'));
                    optBtn.classList.add('selected');
                    userAnswers[qID] = index;
                };
                qDiv.appendChild(optBtn);
            });
            questionsList.appendChild(qDiv);
        });
        document.getElementById('submitBtn').style.display = "block";
        startTimer(); // Start timer ONLY after questions load
    }

    // --- SUBMISSION LOGIC ---
    const processSubmission = async () => {
        let score = 0;
        const querySnapshot = await getDocs(collection(db, "questions"));
        querySnapshot.forEach((doc) => {
            if (userAnswers[doc.id] === doc.data().correctAnswer) { score++; }
        });

        try {
            const studentRef = doc(db, "students", studentID);
            await updateDoc(studentRef, { score: score, hasFinished: true });
            alert(`Exam Submitted! Score: ${score}`);
            localStorage.clear();
            window.location.href = "index.html";
        } catch (e) {
            alert("Error saving. Please tell your teacher immediately.");
        }
    };

    document.getElementById('submitBtn').onclick = () => {
        if (confirm("Submit exam now?")) { processSubmission(); }
    };

    loadQuestions();
</script>
</body>
</html>
