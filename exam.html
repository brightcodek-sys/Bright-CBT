<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>In Progress...</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; padding: 40px; }
        .q-box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        button { display: block; width: 100%; padding: 15px; margin-top: 10px; text-align: left; cursor: pointer; border: 1px solid #eee; border-radius: 5px; background: white; }
        button:hover { background: #f0f7ff; border-color: #1a73e8; }
    </style>
</head>
<body>
    <div class="q-box" id="box">
        <h2 id="qText">Loading...</h2>
        <div id="opts"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE", authDomain: "bright-cbt.firebaseapp.com", projectId: "bright-cbt", storageBucket: "bright-cbt.firebasestorage.app", messagingSenderId: "834402482237", appId: "1:834402482237:web:63c717f80cd154dd1cd254" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const sid = params.get('s');
    const eid = params.get('e');

    let questions = [], idx = 0, score = 0;

    async function start() {
        const q = query(collection(db, "questions"), where("examID", "==", eid));
        const snap = await getDocs(q);
        snap.forEach(d => questions.push(d.data()));
        show();
    }

    function show() {
        if(idx >= questions.length) return finish();
        const q = questions[idx];
        document.getElementById('qText').innerText = q.question;
        document.getElementById('opts').innerHTML = "";
        q.options.forEach(o => {
            let b = document.createElement('button'); b.innerText = o;
            b.onclick = () => { if(o == q.answer) score++; idx++; show(); };
            document.getElementById('opts').appendChild(b);
        });
    }

    async function finish() {
        document.getElementById('box').innerHTML = "Submitting...";
        await updateDoc(doc(db, "students", sid), { hasFinished: true, score: score, examTaken: eid });
        document.getElementById('box').innerHTML = "<h1>Finished! Score: "+score+"</h1>";
    }
    start();
</script>
</body>
</html>
