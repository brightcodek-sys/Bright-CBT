<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright-CBT Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Bright-CBT</h2>
        <p>Enter Admission ID to Start</p>
        <input type="text" id="studentID" placeholder="e.g. JSS1/001">
        <button id="loginBtn">Start Exam</button>
    </div>

    <!-- Firebase SDKs (CDN Version) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your specific config
        const firebaseConfig = {
            apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
            authDomain: "bright-cbt.firebaseapp.com",
            projectId: "bright-cbt",
            storageBucket: "bright-cbt.firebasestorage.app",
            messagingSenderId: "834402482237",
            appId: "1:834402482237:web:63c717f80cd154dd1cd254"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const id = document.getElementById('studentID').value.trim();
            
            if (!id) {
                alert("Please enter an ID");
                return;
            }

            try {
                // Look for the student in the "students" collection
                const docRef = doc(db, "students", id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const studentData = docSnap.data();
                    
                    if (studentData.hasFinished) {
                        alert("You have already submitted this exam!");
                    } else {
                        // Save ID to local storage so the exam page knows who is logged in
                        localStorage.setItem('currentStudent', id);
                        window.location.href = "exam.html";
                    }
                } else {
                    alert("Invalid Admission ID. Please check with your teacher.");
                }
            } catch (error) {
                console.error("Connection Error:", error);
                alert("Connection Error. Check your internet or Firebase Rules.");
            }
        });
    </script>
</body>
</html>
