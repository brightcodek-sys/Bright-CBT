<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright-CBT | Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
        h2 { color: #007bff; margin-bottom: 5px; }
        .toggle-link { color: #28a745; cursor: pointer; font-weight: bold; text-decoration: underline; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background: #ccc; }
        #regDisplay { display: none; background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px dashed #856404; margin-top: 15px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #28a745; } .offline { background: #dc3545; }
    </style>
</head>
<body>

<div class="card">
    <div id="statusIndicator"><span class="status-dot online"></span><small>System Online</small></div>
    
    <!-- Login View -->
    <div id="loginView">
        <h2>Student Login</h2>
        <p style="font-size: 13px; color: #666;">Enter your Registration Number</p>
        <input type="text" id="loginID" placeholder="BRIGHT/2026/XXXX" style="text-transform: uppercase;">
        <button id="loginBtn">Login & Start</button>
        <p style="margin-top: 20px; font-size: 14px;">No Reg No? <span class="toggle-link" onclick="toggleView('reg')">Register here</span></p>
    </div>

    <!-- Registration View -->
    <div id="regView" style="display: none;">
        <h2>New Registration</h2>
        <input type="text" id="studentName" placeholder="Enter Full Name">
        <button id="regBtn" style="background: #28a745;">Generate Reg No</button>
        
        <div id="regDisplay">
            <p style="margin: 0; font-size: 13px;">Your Reg No is:</p>
            <h3 id="generatedID" style="color: #d9534f; margin: 5px 0;"></h3>
            <p style="font-size: 11px; color: #666;">WRITE THIS DOWN! You need it to login.</p>
            <button onclick="location.reload()" style="background: #6c757d; padding: 8px;">Back to Login</button>
        </div>
        <p style="margin-top: 20px; font-size: 14px;"><span class="toggle-link" onclick="toggleView('login')">Back to Login</span></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
        authDomain: "bright-cbt.firebaseapp.com",
        projectId: "bright-cbt",
        storageBucket: "bright-cbt.firebasestorage.app",
        messagingSenderId: "834402482237",
        appId: "1:834402482237:web:63c717f80cd154dd1cd254"
    };

    // Initialize Firebase with Offline Persistence
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });

    // Toggle between Login and Registration
    window.toggleView = (view) => {
        document.getElementById('loginView').style.display = view === 'login' ? 'block' : 'none';
        document.getElementById('regView').style.display = view === 'reg' ? 'block' : 'none';
    };

    // --- REGISTRATION LOGIC ---
    document.getElementById('regBtn').onclick = async () => {
        const name = document.getElementById('studentName').value.trim();
        if (!name) return alert("Enter your name");

        const regBtn = document.getElementById('regBtn');
        regBtn.disabled = true;
        regBtn.innerText = "Processing...";

        const id = `BRIGHT/2026/${Math.floor(1000 + Math.random() * 9000)}`;

        try {
            await setDoc(doc(db, "students", id), {
                studentName: name,
                loginID: id,
                score: 0,
                hasFinished: false
            });
            document.getElementById('studentName').style.display = "none";
            regBtn.style.display = "none";
            document.getElementById('generatedID').innerText = id;
            document.getElementById('regDisplay').style.display = "block";
        } catch (e) {
            alert("Connection slow. Reg No saved locally. Please try logging in with: " + id);
            console.error(e);
        }
    };

    // --- LOGIN LOGIC ---
    document.getElementById('loginBtn').onclick = async () => {
        const id = document.getElementById('loginID').value.trim().toUpperCase();
        if (!id) return alert("Enter Reg No");

        const loginBtn = document.getElementById('loginBtn');
        loginBtn.innerText = "Verifying...";
        loginBtn.disabled = true;

        try {
            const docSnap = await getDoc(doc(db, "students", id));
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.hasFinished) {
                    alert("You have already submitted this exam.");
                } else {
                    localStorage.setItem('currentStudent', id);
                    window.location.href = "exam.html";
                }
            } else {
                alert("ID not found. Register first.");
            }
        } catch (e) {
            alert("Network Error. Check your data.");
        } finally {
            loginBtn.innerText = "Login & Start";
            loginBtn.disabled = false;
        }
    };

    // Online/Offline Status Listener
    window.addEventListener('online', () => document.getElementById('statusIndicator').innerHTML = '<span class="status-dot online"></span><small>System Online</small>');
    window.addEventListener('offline', () => document.getElementById('statusIndicator').innerHTML = '<span class="status-dot offline"></span><small>System Offline (Saving to Phone)</small>');
</script>
</body>
</html>
