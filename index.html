<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright-CBT | Student Portal</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; color: white; }
        .btn-login { background: var(--primary); }
        .btn-reg { background: var(--success); }
        .hidden { display: none; }
        #debug { font-size: 10px; color: red; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginBox">
        <h2>Bright-CBT Login</h2>
        <input type="text" id="loginID" placeholder="REG NO (e.g. BRIGHT/2026/1234)" style="text-transform: uppercase;">
        <button id="loginBtn" class="btn-login">Start Exam</button>
        <p style="font-size: 14px;">No ID? <a href="#" onclick="toggleView()">Register Here</a></p>
    </div>

    <div id="regBox" class="hidden">
        <h2>Register</h2>
        <input type="text" id="studentName" placeholder="Full Name">
        <button id="regBtn" class="btn-reg">Get Reg No</button>
        <p style="font-size: 14px;"><a href="#" onclick="toggleView()">Back to Login</a></p>
    </div>

    <div id="debug"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { initializeFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
        authDomain: "bright-cbt.firebaseapp.com",
        projectId: "bright-cbt",
        storageBucket: "bright-cbt.firebasestorage.app",
        messagingSenderId: "834402482237",
        appId: "1:834402482237:web:63c717f80cd154dd1cd254"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // THIS IS THE FIX FOR HOTSPOTS: It forces a different connection style
    const db = initializeFirestore(app, {
        experimentalAutoDetectLongPolling: true 
    });

    window.toggleView = () => {
        document.getElementById('loginBox').classList.toggle('hidden');
        document.getElementById('regBox').classList.toggle('hidden');
    };

    // --- REGISTRATION ---
    document.getElementById('regBtn').onclick = async () => {
        const name = document.getElementById('studentName').value.trim();
        const id = "BRIGHT/2026/" + Math.floor(1000 + Math.random() * 9000);
        const email = id.replace(/\//g, ".") + "@cbt.com";

        try {
            await createUserWithEmailAndPassword(auth, email, "password123");
            await setDoc(doc(db, "students", id), { name, email, score: 0 });
            alert("Your ID is: " + id);
            location.reload();
        } catch (e) {
            document.getElementById('debug').innerText = "Reg Error: " + e.code;
        }
    };

    // --- LOGIN ---
    document.getElementById('loginBtn').onclick = async () => {
        const id = document.getElementById('loginID').value.trim().toUpperCase();
        try {
            const docSnap = await getDoc(doc(db, "students", id));
            if (docSnap.exists()) {
                await signInWithEmailAndPassword(auth, docSnap.data().email, "password123");
                localStorage.setItem('studentID', id);
                window.location.href = "exam.html";
            } else {
                alert("ID not found!");
            }
        } catch (e) {
            document.getElementById('debug').innerText = "Login Error: " + e.code;
        }
    };
</script>
</body>
</html>
