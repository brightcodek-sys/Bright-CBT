<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright-CBT | Portal</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --admin: #6f42c1; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; color: white; }
        .btn-login { background: var(--primary); }
        .btn-reg { background: var(--success); }
        .btn-admin { background: var(--admin); }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginView">
        <h2>Bright-CBT</h2>
        <input type="text" id="loginID" placeholder="REG NO OR ADMIN KEY" style="text-transform: uppercase;">
        <button id="loginBtn" class="btn-login">Login / Access Admin</button>
        <p style="font-size: 14px;">New? <a href="#" onclick="showView('regView')">Register here</a></p>
    </div>

    <div id="regView" class="hidden">
        <h2>Register</h2>
        <input type="text" id="studentName" placeholder="Full Name">
        <button id="regBtn" class="btn-reg">Generate Reg No</button>
        <div id="regResult" class="hidden" style="background:#fff3cd; padding:15px; margin-top:10px; border-radius:8px;">
            <p>Your ID: <strong id="displayID" style="color:red;"></strong></p>
            <button onclick="location.reload()" style="background:#6c757d;">Back to Login</button>
        </div>
        <p><a href="#" onclick="showView('loginView')">Back</a></p>
    </div>

    <div id="adminView" class="hidden">
        <h2 style="color:var(--admin)">Admin Dashboard</h2>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button onclick="showAdminTab('addQuest')" style="background:#333; font-size:12px;">Add Question</button>
            <button onclick="loadResults()" style="background:#333; font-size:12px;">View Results</button>
        </div>

        <div id="addQuest">
            <textarea id="qText" placeholder="Question Text"></textarea>
            <input type="text" id="optA" placeholder="Option A">
            <input type="text" id="optB" placeholder="Option B">
            <input type="text" id="optC" placeholder="Option C">
            <input type="text" id="optD" placeholder="Option D">
            <select id="correctOpt">
                <option value="">Select Correct Answer</option>
                <option value="A">A</option><option value="B">B</option>
                <option value="C">C</option><option value="D">D</option>
            </select>
            <button id="saveQBtn" class="btn-admin">Save Question</button>
        </div>

        <div id="viewResults" class="hidden">
            <table>
                <thead><tr><th>Name</th><th>ID</th><th>Score</th></tr></thead>
                <tbody id="resultsTable"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="background:red; margin-top:20px;">Logout Admin</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { initializeFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
        authDomain: "bright-cbt.firebaseapp.com",
        projectId: "bright-cbt",
        storageBucket: "bright-cbt.firebasestorage.app",
        messagingSenderId: "834402482237",
        appId: "1:834402482237:web:63c717f80cd154dd1cd254"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    const ADMIN_KEY = "ADMIN123"; // CHANGE THIS TO YOUR SECRET KEY

    window.showView = (id) => {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.showAdminTab = (tab) => {
        document.getElementById('addQuest').classList.add('hidden');
        document.getElementById('viewResults').classList.add('hidden');
        document.getElementById(tab).classList.remove('hidden');
    };

    // --- LOGIN LOGIC ---
    document.getElementById('loginBtn').onclick = async () => {
        const val = document.getElementById('loginID').value.trim().toUpperCase();
        if(!val) return alert("Enter ID");

        if(val === ADMIN_KEY) {
            showView('adminView');
            return;
        }

        try {
            const docSnap = await getDoc(doc(db, "students", val));
            if(docSnap.exists()) {
                const data = docSnap.data();
                await signInWithEmailAndPassword(auth, data.email, "password123");
                localStorage.setItem('currentStudent', val);
                window.location.href = "exam.html";
            } else { alert("ID Not Found"); }
        } catch(e) { alert("Error connecting to server."); }
    };

    // --- REGISTER LOGIC ---
    document.getElementById('regBtn').onclick = async () => {
        const name = document.getElementById('studentName').value.trim();
        if(!name) return alert("Enter Name");
        const id = "BRIGHT/2026/" + Math.floor(1000 + Math.random()*9000);
        const email = id.replace(/\//g, ".") + "@cbt.com";

        try {
            await createUserWithEmailAndPassword(auth, email, "password123");
            await setDoc(doc(db, "students", id), { studentName: name, email: email, score: 0, hasFinished: false });
            document.getElementById('displayID').innerText = id;
            document.getElementById('regResult').classList.remove('hidden');
        } catch(e) { alert("Registration failed."); }
    };

    // --- ADMIN: SAVE QUESTION ---
    document.getElementById('saveQBtn').onclick = async () => {
        const qData = {
            question: document.getElementById('qText').value,
            A: document.getElementById('optA').value,
            B: document.getElementById('optB').value,
            C: document.getElementById('optC').value,
            D: document.getElementById('optD').value,
            answer: document.getElementById('correctOpt').value
        };
        try {
            const qID = "Q" + Date.now();
            await setDoc(doc(db, "questions", qID), qData);
            alert("Question Saved!");
            document.querySelectorAll('#addQuest input, #addQuest textarea').forEach(i => i.value = "");
        } catch(e) { alert("Failed to save."); }
    };

    // --- ADMIN: VIEW RESULTS ---
    window.loadResults = async () => {
        showAdminTab('viewResults');
        const querySnap = await getDocs(collection(db, "students"));
        const table = document.getElementById('resultsTable');
        table.innerHTML = "";
        querySnap.forEach(doc => {
            const d = doc.data();
            table.innerHTML += `<tr><td>${d.studentName}</td><td>${doc.id}</td><td>${d.score}</td></tr>`;
        });
    };
</script>
</body>
</html>
