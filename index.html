<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright-CBT | Portal</title>
    <style>
        :root { --primary: #007bff; --admin: #6f42c1; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-top: 10px; }
        .btn-blue { background: var(--primary); }
        .btn-purple { background: var(--admin); }
        .hidden { display: none; }
        #status { font-size: 11px; margin-top: 10px; color: #777; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-view">
        <h2>Bright-CBT</h2>
        <input type="text" id="userInput" placeholder="REG NO OR ADMIN KEY" style="text-transform: uppercase;">
        <button id="entryBtn" class="btn-blue">Login to Portal</button>
        <p style="font-size: 13px;">New? <a href="#" onclick="showView('reg-view')">Register</a></p>
    </div>

    <div id="reg-view" class="hidden">
        <h2>Register</h2>
        <input type="text" id="regName" placeholder="Full Name">
        <button id="createBtn" style="background: #28a745;">Get Reg No</button>
        <p><a href="#" onclick="showView('login-view')">Back</a></p>
    </div>

    <div id="admin-view" class="hidden">
        <h2 style="color: var(--admin);">Admin Panel</h2>
        <select id="subSelect">
            <option value="Basic Science">Basic Science</option>
            <option value="Mathematics">Mathematics</option>
            <option value="History">History</option>
            <option value="English">English</option>
        </select>
        <textarea id="qText" placeholder="Enter Question"></textarea>
        <input type="text" id="optA" placeholder="Option A">
        <input type="text" id="optB" placeholder="Option B">
        <input type="text" id="optC" placeholder="Option C">
        <input type="text" id="optD" placeholder="Option D">
        <select id="correctAns">
            <option value="">Correct Answer</option>
            <option value="A">A</option><option value="B">B</option>
            <option value="C">C</option><option value="D">D</option>
        </select>
        <button id="saveBtn" class="btn-purple">Upload Question</button>
        <button onclick="location.reload()" style="background:#333; font-size:12px;">Logout</button>
    </div>
    <div id="status">System Ready</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { initializeFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCW5QHNyXAEk7O86u0HajGDtnshgej10JE",
        authDomain: "bright-cbt.firebaseapp.com",
        projectId: "bright-cbt",
        storageBucket: "bright-cbt.firebasestorage.app",
        messagingSenderId: "834402482237",
        appId: "1:834402482237:web:63c717f80cd154dd1cd254"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true });

    window.showView = (id) => {
        document.querySelectorAll('.card > div:not(#status)').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    document.getElementById('entryBtn').onclick = async () => {
        const val = document.getElementById('userInput').value.trim().toUpperCase();
        if(val === "ADMIN123") return showView('admin-view');
        
        try {
            const snap = await getDoc(doc(db, "students", val));
            if(snap.exists()) {
                await signInWithEmailAndPassword(auth, snap.data().email, "password123");
                localStorage.setItem('currentStudent', val);
                window.location.href = "exam.html";
            } else { alert("ID not found"); }
        } catch(e) { alert("Error: " + e.code); }
    };

    document.getElementById('saveBtn').onclick = async () => {
        const qID = "Q" + Date.now();
        await setDoc(doc(db, "questions", qID), {
            subject: document.getElementById('subSelect').value,
            question: document.getElementById('qText').value,
            A: document.getElementById('optA').value,
            B: document.getElementById('optB').value,
            C: document.getElementById('optC').value,
            D: document.getElementById('optD').value,
            answer: document.getElementById('correctAns').value
        });
        alert("Saved to " + document.getElementById('subSelect').value);
        document.querySelectorAll('input, textarea').forEach(i => i.value = "");
    };
</script>
</body>
</html>
